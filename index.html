<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<div class="login-container">

    <img src="assets/github-logo.png" class="logo">

    <h2>GitHub Issues Tracker</h2>
    <p class="subtitle">Sign in to manage your issues</p>

    <form id="loginForm">

        <label>Username</label>
        <input type="text" id="username" placeholder="Enter Username" required>
        <p class="default">Default: admin</p>

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Password" required>
        <p class="default">Default: admin123</p>

        <button type="submit">Sign In</button>

    </form>

<div class="or">OR</div>

<div class="demo">

    <p>Demo Credentials:</p>

    <p><b>Username:</b> admin</p>
    <p><b>Password:</b> admin123</p>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
