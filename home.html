<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Issues Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="left">
    <img class="img" src="assets/github-logo.png">
    <h2>GitHub Issues Tracker</h2>
  </div>

  <div class="right">
    <i class=" icon fa-solid fa-magnifying-glass"></i>
    <input id="searchInput"  placeholder="Search issues..." >
    <button class="issue">+ New Issue</button>
  </div>
</nav>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setTab(this,'all')">All</button>
  <button class="tab" onclick="setTab(this,'open')">Open</button>
  <button class="tab" onclick="setTab(this,'closed')">Closed</button>
</div>



<script src="script.js"></script>
</body>
</html>
